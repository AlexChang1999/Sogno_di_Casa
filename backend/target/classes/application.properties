# ═══════════════════════════════
# PostgreSQL 資料庫連線設定
# ═══════════════════════════════
# 請先建立資料庫：CREATE DATABASE sognodicasa;
spring.datasource.url=jdbc:postgresql://localhost:5432/sognodicasa
spring.datasource.username=postgres
spring.datasource.password=4119Kx03

# JPA/Hibernate 設定
# update = 自動根據 Entity 建立/更新資料表（開發用）
# 正式環境請改為 validate 或 none
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ═══════════════════════════════
# JWT 設定
# ═══════════════════════════════
# secret 至少 32 字元（256 bits），正式環境請換成更複雜的字串
jwt.secret=FormaJwtSecretKey2025MustBe32CharsLongAtLeast!!
# token 有效時間：24 小時（毫秒）
jwt.expiration=86400000

# ═══════════════════════════════
# 伺服器設定
# ═══════════════════════════════
server.port=8080

# ═══════════════════════════════
# CORS：允許前端網頁呼叫 API
# ═══════════════════════════════
cors.allowed-origins=http://localhost:3333

# ═══════════════════════════════
# 商品圖片上傳設定
# ═══════════════════════════════
# 圖片存放目錄（相對於後端執行目錄，不需要手動建立，程式會自動建）
app.upload-dir=./uploads

# ═══════════════════════════════
# 管理員設定密碼
# ═══════════════════════════════
# 用於 POST /api/auth/setup-admin 端點，把指定帳號升級為管理員
# 正式環境請換成更複雜的字串，並加入 .gitignore
app.admin-setup-secret=FORMA_ADMIN_2025

# 允許上傳最大 20MB 的圖片
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ═══════════════════════════════
# Email 驗證碼設定（Gmail SMTP）
# ═══════════════════════════════
# 請至 Google 帳號 → 安全性 → 兩步驟驗證 → 應用程式密碼 → 生成密碼
# 把生成的 16 碼密碼填入 app.mail.password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=johnjon823@gmail.com
spring.mail.password=qdlmqxbdyipgnwbt
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=FORMA 家具 <johnjon823@gmail.com>

# 驗證碼有效時間（分鐘）
app.verification.expire-minutes=10

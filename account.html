<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的帳號 — FORMA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .account-wrap { max-width: 760px; margin: 0 auto; padding: 3rem 1rem; }
    .account-header {
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--color-border); padding-bottom: 1.5rem; margin-bottom: 2rem;
    }
    .account-name {
      font-family: var(--font-display); font-weight: 300;
      font-size: 1.8rem; letter-spacing: .05em;
    }
    .account-email { font-size: .8rem; color: var(--color-muted); margin-top: .2rem; }
    .logout-btn {
      background: none; border: 1px solid var(--color-border);
      padding: .4rem 1rem; font-size: .75rem; letter-spacing: .08em;
      text-transform: uppercase; cursor: pointer; transition: all .2s;
    }
    .logout-btn:hover { background: var(--color-dark); color: #fff; border-color: var(--color-dark); }
    .orders-title {
      font-size: .75rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--color-muted); margin-bottom: 1.2rem;
    }
    .order-card {
      border: 1px solid var(--color-border); padding: 1.5rem;
      margin-bottom: 1rem; transition: border-color .2s;
    }
    .order-card:hover { border-color: var(--color-dark); }
    .order-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem; flex-wrap: wrap; gap: .5rem;
    }
    .order-id { font-size: .75rem; letter-spacing: .08em; color: var(--color-muted); }
    .order-date { font-size: .8rem; color: var(--color-muted); }
    .order-total { font-weight: 500; font-size: .95rem; }
    .order-item-row {
      display: flex; justify-content: space-between;
      font-size: .85rem; padding: .3rem 0;
      border-bottom: 1px solid var(--color-bg);
    }
    .order-item-row:last-child { border-bottom: none; }
    .order-item-name { color: var(--color-dark); }
    .order-item-price { color: var(--color-muted); }
    .no-orders {
      text-align: center; padding: 4rem 0; color: var(--color-muted);
    }
    .no-orders i { font-size: 3rem; display: block; margin-bottom: 1rem; opacity: .3; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg sticky-top forma-nav">
    <div class="container-fluid px-4">
      <a class="navbar-brand forma-logo" href="index.html">FORMA</a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <i class="bi bi-list fs-4"></i>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav mx-auto gap-4">
          <li class="nav-item"><a class="nav-link" href="index.html">首頁</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">商品</a></li>
          <li class="nav-item"><a class="nav-link" href="#">關於品牌</a></li>
          <li class="nav-item"><a class="nav-link" href="#">設計師</a></li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          <a href="#" class="nav-icon"><i class="bi bi-search"></i></a>
          <a href="#" class="nav-icon"><i class="bi bi-person"></i></a>
          <a href="cart.html" class="nav-icon cart-icon">
            <i class="bi bi-bag"></i>
            <span class="cart-badge" id="cartCount">0</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <div class="account-wrap">
    <div class="account-header">
      <div>
        <div class="account-name" id="accName">—</div>
        <div class="account-email" id="accEmail">—</div>
      </div>
      <button class="logout-btn" onclick="logout()">登出</button>
    </div>

    <p class="orders-title">購買紀錄</p>
    <div id="orderList"></div>
  </div>

  <footer class="forma-footer">
    <div class="container">
      <div class="footer-bottom py-4">
        <p>© 2025 FORMA. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="cart.js"></script>
  <script src="auth.js"></script>
  <script>
    // 未登入則導向登入頁
    const user = getCurrentUser();
    if (!user) {
      sessionStorage.setItem('loginRedirect', 'account.html');
      window.location.href = 'login.html';
    }

    document.getElementById('accName').textContent  = user?.name  || '';
    document.getElementById('accEmail').textContent = user?.email || '';

    const orderList = document.getElementById('orderList');

    // 顯示載入中
    orderList.innerHTML = `<p style="color:var(--color-muted);text-align:center;padding:2rem;">載入中...</p>`;

    // 從後端 API 取得訂單（需要 JWT token）
    authFetch('http://localhost:8080/api/orders')
      .then(res => {
        if (!res.ok) throw new Error('無法取得訂單');
        return res.json();
      })
      .then(orders => {
        if (orders.length === 0) {
          orderList.innerHTML = `
            <div class="no-orders">
              <i class="bi bi-bag-x"></i>
              <p>目前還沒有任何訂單</p>
              <a href="products.html" class="btn-forma mt-3 d-inline-block">開始選購</a>
            </div>`;
        } else {
          orderList.innerHTML = orders.map(o => `
            <div class="order-card">
              <div class="order-meta">
                <span class="order-id">${o.id}</span>
                <span class="order-date">${o.date}</span>
                <span class="order-total">NT$ ${Number(o.total).toLocaleString()}</span>
              </div>
              ${o.items.map(item => `
                <div class="order-item-row">
                  <span class="order-item-name">
                    ${item.brand ? item.brand + ' · ' : ''}${item.productName} × ${item.qty}
                    ${item.color ? `<span style="color:var(--color-muted);font-size:.78rem;">（${[item.color, item.wood].filter(Boolean).join(' · ')}）</span>` : ''}
                  </span>
                  <span class="order-item-price">NT$ ${(Number(item.price) * item.qty).toLocaleString()}</span>
                </div>
              `).join('')}
            </div>
          `).join('');
        }
      })
      .catch(() => {
        orderList.innerHTML = `<p style="color:#c0392b;text-align:center;padding:2rem;">無法連線到伺服器，請確認後端已啟動。</p>`;
      });
  </script>
</body>
</html>

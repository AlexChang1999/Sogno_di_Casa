<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品列表 — FORMA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg sticky-top forma-nav">
    <div class="container-fluid px-4">
      <a class="navbar-brand forma-logo" href="index.html">FORMA</a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <i class="bi bi-list fs-4"></i>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav mx-auto gap-4">
          <li class="nav-item"><a class="nav-link" href="index.html">首頁</a></li>
          <li class="nav-item"><a class="nav-link active" href="products.html">商品</a></li>
          <li class="nav-item"><a class="nav-link" href="#">關於品牌</a></li>
          <li class="nav-item"><a class="nav-link" href="#">設計師</a></li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          <a href="#" class="nav-icon"><i class="bi bi-search"></i></a>
          <a href="#" class="nav-icon"><i class="bi bi-person"></i></a>
          <a href="cart.html" class="nav-icon cart-icon">
            <i class="bi bi-bag"></i>
            <span class="cart-badge" id="cartCount">0</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="container">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb forma-breadcrumb">
          <li class="breadcrumb-item"><a href="index.html">首頁</a></li>
          <li class="breadcrumb-item active">所有商品</li>
        </ol>
      </nav>
      <h1 class="page-title">所有商品</h1>
    </div>
  </div>

  <!-- MAIN -->
  <div class="container py-5">
    <div class="row g-4">

      <!-- SIDEBAR FILTER -->
      <div class="col-12 col-lg-3">
        <div class="filter-panel">
          <h5 class="filter-heading">篩選條件</h5>

          <!-- Category -->
          <div class="filter-group">
            <h6 class="filter-sub">類別</h6>
            <div class="form-check filter-check">
              <input class="form-check-input" type="checkbox" id="cat-all" checked onchange="handleCatAll()">
              <label class="form-check-label" for="cat-all">全部</label>
            </div>
            <div class="form-check filter-check">
              <input class="form-check-input" type="checkbox" id="cat-chair" onchange="handleCatSpecific()">
              <label class="form-check-label" for="cat-chair">椅子</label>
            </div>
            <div class="form-check filter-check">
              <input class="form-check-input" type="checkbox" id="cat-sofa" onchange="handleCatSpecific()">
              <label class="form-check-label" for="cat-sofa">沙發</label>
            </div>
            <div class="form-check filter-check">
              <input class="form-check-input" type="checkbox" id="cat-table" onchange="handleCatSpecific()">
              <label class="form-check-label" for="cat-table">桌子</label>
            </div>
            <div class="form-check filter-check">
              <input class="form-check-input" type="checkbox" id="cat-storage" onchange="handleCatSpecific()">
              <label class="form-check-label" for="cat-storage">收納</label>
            </div>
          </div>

          <!-- Brand -->
          <div class="filter-group">
            <h6 class="filter-sub">品牌</h6>
            <div class="form-check filter-check">
              <input class="form-check-input" type="checkbox" id="brand-hm" onchange="filterProducts()">
              <label class="form-check-label" for="brand-hm">Herman Miller</label>
            </div>
            <div class="form-check filter-check">
              <input class="form-check-input" type="checkbox" id="brand-cassina" onchange="filterProducts()">
              <label class="form-check-label" for="brand-cassina">Cassina</label>
            </div>
            <div class="form-check filter-check">
              <input class="form-check-input" type="checkbox" id="brand-vitra" onchange="filterProducts()">
              <label class="form-check-label" for="brand-vitra">Vitra</label>
            </div>
            <div class="form-check filter-check">
              <input class="form-check-input" type="checkbox" id="brand-fritz" onchange="filterProducts()">
              <label class="form-check-label" for="brand-fritz">Fritz Hansen</label>
            </div>
            <div class="form-check filter-check">
              <input class="form-check-input" type="checkbox" id="brand-knoll" onchange="filterProducts()">
              <label class="form-check-label" for="brand-knoll">Knoll</label>
            </div>
          </div>

          <!-- Price Range -->
          <div class="filter-group">
            <h6 class="filter-sub">價格區間</h6>
            <input type="range" class="forma-range" id="priceRange" min="0" max="10000000" value="10000000" step="10000" oninput="updatePrice(this.value); filterProducts()">
            <p class="price-display">NT$ 0 — <span id="priceMax">10,000,000</span></p>
          </div>

          <!-- Sort -->
          <div class="filter-group">
            <h6 class="filter-sub">排序</h6>
            <select class="forma-select" id="sortBy" onchange="sortProducts()">
              <option value="default">預設排序</option>
              <option value="price-asc">價格：低到高</option>
              <option value="price-desc">價格：高到低</option>
              <option value="name">名稱 A-Z</option>
            </select>
          </div>
        </div>
      </div>

      <!-- PRODUCT GRID -->
      <div class="col-12 col-lg-9">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <p class="result-count">顯示 <span id="productCount">12</span> 件商品</p>
          <div class="d-flex gap-2">
            <button class="view-btn active" id="gridBtn" onclick="setView('grid')"><i class="bi bi-grid"></i></button>
            <button class="view-btn" id="listBtn" onclick="setView('list')"><i class="bi bi-list-ul"></i></button>
          </div>
        </div>

        <div class="row g-4" id="productGrid">
          <!-- Products rendered by JS -->
        </div>

        <!-- Pagination -->
        <nav class="mt-5">
          <ul class="pagination forma-pagination justify-content-center">
            <li class="page-item disabled"><a class="page-link" href="#"><i class="bi bi-chevron-left"></i></a></li>
            <li class="page-item active"><a class="page-link" href="#">1</a></li>
            <li class="page-item"><a class="page-link" href="#">2</a></li>
            <li class="page-item"><a class="page-link" href="#">3</a></li>
            <li class="page-item"><a class="page-link" href="#"><i class="bi bi-chevron-right"></i></a></li>
          </ul>
        </nav>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="forma-footer">
    <div class="container">
      <div class="footer-bottom py-4">
        <p>© 2025 FORMA. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="cartToast" class="toast align-items-center text-bg-dark border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body"><i class="bi bi-check-circle me-2"></i> 已加入購物車！</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="cart.js"></script>
  <script src="auth.js"></script>
  <script src="product-images.js"></script>
  <script src="products.js"></script>
</body>
</html>
